<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Insights</title>
  <style>
    :root {
      --bg: #f2efe7;
      --card: #ffffff;
      --ink: #132027;
      --muted: #4f5a61;
      --brand: #0b6d77;
      --accent: #e6a817;
      --line: #d9d2c3;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, #fff6d9 0, transparent 30%),
        radial-gradient(circle at 90% 0%, #d6f3f6 0, transparent 35%),
        var(--bg);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(19, 32, 39, 0.08);
    }
    .status-card {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
    }
    .status-item {
      background: #f8f6ef;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .status-kicker {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .status-value {
      font-size: 1rem;
      font-weight: 700;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .pill.ok {
      background: #dff5e6;
      color: #12663a;
    }
    .pill.warn {
      background: #fff1d7;
      color: #925d00;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      letter-spacing: 0.2px;
    }
    .subtitle {
      color: var(--muted);
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 10px;
    }
    label {
      font-size: 0.9rem;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 0.95rem;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .btn {
      border: none;
      background: var(--brand);
      color: #fff;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.secondary {
      background: #415a6a;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #111a1f;
      color: #d2e9f0;
      padding: 12px;
      border-radius: 10px;
      min-height: 200px;
    }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ink);
      font-size: 0.9rem;
    }
    @media (max-width: 840px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Portfolio Insights</h1>
      <p class="subtitle">Scan organization repositories and ask portfolio-level engineering questions from aggregated evidence.</p>
    </section>

    <section class="card">
      <h2>Backend Status</h2>
      <div class="status-card">
        <div class="status-item">
          <div class="status-kicker">Agent</div>
          <div id="agent_mode" class="status-value">Checking...</div>
        </div>
        <div class="status-item">
          <div class="status-kicker">Model</div>
          <div id="agent_model" class="status-value">Checking...</div>
        </div>
        <div class="status-item">
          <div class="status-kicker">Indexed Repos</div>
          <div id="indexed_repo_count" class="status-value">Checking...</div>
        </div>
      </div>
      <div class="row">
        <span id="llm_badge" class="pill warn">LLM unavailable</span>
        <span id="data_dir_label"></span>
      </div>
    </section>

    <section class="card">
      <h2>Run Scan</h2>
      <div class="grid">
        <div>
          <label for="org">Organization</label>
          <input id="org" type="text" value="{{ default_org }}" />
        </div>
        <div>
          <label for="credential_target">Credential Manager Target (preferred)</label>
          <input id="credential_target" type="text" value="{{ default_credential_target }}" placeholder="Generic credential target name" />
        </div>
        <div>
          <label for="clone_root">Clone Root</label>
          <input id="clone_root" type="text" value="{{ default_clone_root }}" />
        </div>
        <div>
          <label for="output_path">Output Path (optional)</label>
          <input id="output_path" type="text" value="" />
        </div>
      </div>
      <div class="row">
        <label class="check"><input id="clone_enabled" type="checkbox" /> Enable cloning</label>
        <label class="check"><input id="force_reclone" type="checkbox" /> Force re-clone</label>
      </div>
      <div class="row">
        <button id="scan_btn" class="btn">Run Scan</button>
      </div>
    </section>

    <section class="card">
      <h2>Ask Question</h2>
      <div class="grid">
        <div style="grid-column: 1 / -1;">
          <label for="question">Question</label>
          <input id="question" type="text" value="How many projects contain custom Esri WebMap widgets?" />
        </div>
      </div>
      <div class="row">
        <button id="ask_btn" class="btn secondary">Ask</button>
      </div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <pre id="out">Ready.</pre>
    </section>
  </main>

  <script>
    const out = document.getElementById("out");
    const scanBtn = document.getElementById("scan_btn");
    const askBtn = document.getElementById("ask_btn");
    const agentMode = document.getElementById("agent_mode");
    const agentModel = document.getElementById("agent_model");
    const indexedRepoCount = document.getElementById("indexed_repo_count");
    const llmBadge = document.getElementById("llm_badge");
    const dataDirLabel = document.getElementById("data_dir_label");
    const savedCredentialTarget = localStorage.getItem("portfolioInsights.credentialTarget");
    const savedOrg = localStorage.getItem("portfolioInsights.org");

    if (savedCredentialTarget) {
      document.getElementById("credential_target").value = savedCredentialTarget;
    }
    if (savedOrg) {
      document.getElementById("org").value = savedOrg;
    }

    function print(obj) {
      if (typeof obj === "string") {
        out.textContent = obj;
      } else {
        out.textContent = JSON.stringify(obj, null, 2);
      }
    }

    function renderStatus(status) {
      const llm = status.llm || {};
      const available = !!llm.available;
      agentMode.textContent = available ? "Local LLM + retrieval" : "Deterministic fallback";
      agentModel.textContent = llm.model || "Not configured";
      indexedRepoCount.textContent = String(status.indexed_repo_count ?? 0);
      llmBadge.textContent = available ? "LLM available" : "LLM unavailable";
      llmBadge.className = "pill " + (available ? "ok" : "warn");
      dataDirLabel.textContent = status.data_dir ? "Data dir: " + status.data_dir : "";
    }

    async function refreshStatus() {
      try {
        const resp = await fetch("/api/agent-status");
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.detail || "Status check failed");
        }
        renderStatus(data);
      } catch (err) {
        agentMode.textContent = "Status unavailable";
        agentModel.textContent = "Unavailable";
        indexedRepoCount.textContent = "0";
        llmBadge.textContent = "Status error";
        llmBadge.className = "pill warn";
        dataDirLabel.textContent = err.message;
      }
    }

    scanBtn.addEventListener("click", async () => {
      scanBtn.disabled = true;
      print("Running scan...");
      try {
        const payload = {
          org: document.getElementById("org").value || null,
          credential_target: document.getElementById("credential_target").value || null,
          clone_root: document.getElementById("clone_root").value || "./.cache/org-repo-clones",
          output_path: document.getElementById("output_path").value || null,
          clone_enabled: document.getElementById("clone_enabled").checked,
          force_reclone: document.getElementById("force_reclone").checked,
        };

        localStorage.setItem("portfolioInsights.org", payload.org || "");
        localStorage.setItem("portfolioInsights.credentialTarget", payload.credential_target || "");

        const resp = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.detail || "Scan failed");
        }
        print(data);
        refreshStatus();
      } catch (err) {
        print("Error: " + err.message);
      } finally {
        scanBtn.disabled = false;
      }
    });

    askBtn.addEventListener("click", async () => {
      askBtn.disabled = true;
      try {
        const payload = {
          question: document.getElementById("question").value,
          report_path: document.getElementById("output_path").value || null,
        };
        const resp = await fetch("/api/question", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.detail || "Question failed");
        }
        print(data);
        refreshStatus();
      } catch (err) {
        print("Error: " + err.message);
      } finally {
        askBtn.disabled = false;
      }
    });

    refreshStatus();
  </script>
</body>
</html>
